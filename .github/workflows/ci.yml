name: LearnGPT CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  clean-clone-course:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.13']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            final_project/requirements.txt
            final_project/requirements-common.txt

      - name: Install CPU PyTorch and pinned dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install torch==2.12.1 --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r final_project/requirements-common.txt

      - name: Validate the public project
        run: python -B tools/validate_learngpt.py

      - name: Run final-project regression tests
        run: python -B -m unittest discover -s tests -v

      - name: Run all 42 lessons from tracked files
        run: python -B tools/run_all_lessons.py
